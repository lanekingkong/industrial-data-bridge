# Prometheus configuration for Industrial Data Bridge

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "idb-monitor"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Load alerting rules
rule_files:
  - /etc/prometheus/alerts.yml

# Scrape configurations
scrape_configs:
  # Self monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Industrial Data Bridge API
  - job_name: "idb-api"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["idb-api:8000"]
        labels:
          service: "idb-api"
          environment: "production"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "idb-api"

  # Edge agents
  - job_name: "idb-edge"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "edge-agent-1:8001"
          - "edge-agent-2:8001"
          - "edge-agent-3:8001"
        labels:
          service: "idb-edge"
          environment: "production"

  # PostgreSQL
  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # Node (for Docker host monitoring)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node"

  # Docker containers
  - job_name: "docker"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: "docker"

# Alert rules
alerting_rules:
  groups:
    - name: idb_alerts
      rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status="500"}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High API error rate detected"
            description: "Error rate is {{ $value }} over the last 5 minutes"

        - alert: HighResponseTime
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High response time detected"
            description: "95th percentile response time is {{ $value }}s"

        - alert: DeviceOffline
          expr: idb_devices_online < 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "All devices are offline"
            description: "No devices are reporting data"

        - alert: EdgeAgentOffline
          expr: idb_edge_agents_online < 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Edge agent offline"
            description: "Edge agent has been offline for 2 minutes"

        - alert: DataCollectionFailure
          expr: rate(idb_collection_errors_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High data collection failure rate"
            description: "Collection errors: {{ $value }}"

        - alert: AnomalyDetected
          expr: idb_anomalies_detected_total > 0
          labels:
            severity: warning
          annotations:
            summary: "Anomaly detected in device data"
            description: "{{ $value }} anomalies detected"

        - alert: StorageUsageHigh
          expr: idb_storage_usage_percent > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Storage usage is high"
            description: "Storage usage is {{ $value }}%"

        - alert: PredictionMaintenanceRequired
          expr: idb_rul_estimate_hours < 48
          labels:
            severity: critical
          annotations:
            summary: "Maintenance urgent - low RUL"
            description: "Device has {{ $value }} hours remaining useful life"