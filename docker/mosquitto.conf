# Mosquitto MQTT Broker Configuration
# Industrial Data Bridge - MQTT Adapter

# Network Configuration

# Listen on all interfaces
listener 1883 0.0.0.0
protocol mqtt

# WebSocket support for browser clients
listener 9001 0.0.0.0
protocol websockets

# Authentication

# Allow anonymous connections for development
allow_anonymous true

# For production, enable authentication:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# Security Settings

# Restrict to MQTT protocol version 3.1, 3.1.1, and 5.0
max_protocol_version 5

# Limit topic access (uncomment in production)
# acl_file /mosquitto/config/acl

# Performance Settings

# Maximum number of connections
max_connections 1000

# Maximum number of allowed queued messages
max_queued_messages 1000

# Maximum size of queued messages in bytes
max_queued_bytes 104857600

# Default message size limit
message_size_limit 268435456

# Quality of Service
max_inflight_messages 20
max_keepalive 65535
retry_interval 20

# Persistence

# Enable persistence for QoS 1 and 2 messages
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800
persistent_client_expiration 24h

# Logging

# Log destination
log_dest stdout

# Log types to include
log_type error
log_type warning
log_type notice
log_type information

# Timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection tracking
connection_messages true

# System Topics

# Enable $SYS topics for monitoring
sys_interval 10

# Bridge Configuration (Optional - for multi-site deployment)

# connection cloud-bridge
# address idb-cloud.example.com:1883
# topic industrial/# out 2
# topic alerts/# out 1
# remote_clientid idb-edge-bridge

# TLS Configuration (for production)

# listener 8883
# protocol mqtt
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false
# tls_version tlsv1.2